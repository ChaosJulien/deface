name: build-windows-gui

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm 需要 tag 历史

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyside6 onnxruntime pillow pytesseract pyinstaller

      - name: Vendor Tesseract (chi_sim + eng)
        shell: pwsh
        run: |
          choco install -y --no-progress tesseract
          $TessRoot = 'C:\Program Files\Tesseract-OCR'
          New-Item -ItemType Directory -Force vendor\tesseract\tessdata | Out-Null
          Copy-Item "$TessRoot\*.exe" vendor\tesseract\ -Force
          Copy-Item "$TessRoot\*.dll" vendor\tesseract\ -Force
          if (Test-Path "$TessRoot\tessdata\eng.traineddata") {
            Copy-Item "$TessRoot\tessdata\eng.traineddata" vendor\tesseract\tessdata\ -Force
          }
          if (Test-Path "$TessRoot\tessdata\osd.traineddata") {
            Copy-Item "$TessRoot\tessdata\osd.traineddata" vendor\tesseract\tessdata\ -Force
          }
          Invoke-WebRequest -Uri 'https://github.com/tesseract-ocr/tessdata_fast/raw/main/chi_sim.traineddata' `
            -OutFile vendor\tesseract\tessdata\chi_sim.traineddata
          Get-ChildItem vendor\tesseract -Recurse | Select-Object FullName, Length

      - name: Build
        run: pyinstaller deface_gui.spec --clean --noconfirm

      # 直接上传文件夹 — actions/upload-artifact 会包一次 zip,gh run download 解压后就是
      # deface_gui-windows-x64/{deface_gui.exe, _internal/...},不再有双层 zip
      - uses: actions/upload-artifact@v4
        with:
          name: deface_gui-windows-x64
          path: dist/deface_gui/
          retention-days: 30

      # release 用单独 zip(softprops 需要文件,不能上传文件夹)
      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path dist\deface_gui\* -DestinationPath deface_gui-windows-x64.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: deface_gui-windows-x64.zip
